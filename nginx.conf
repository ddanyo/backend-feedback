server {
    listen 80;

    location = /send/assets {
        return 301 $scheme://$http_host/send/;
    }

    location /send/ {
        proxy_pass http://fs-form-container:80/;
    }

    location /api {
        proxy_pass http://fs-backend-container:3000;
    }

    location / {
        return 404;
        # proxy_pass http://fs-table-container:80; 
    }
}

# localhost:2510/send/assets/index.html -> localhost:2510/assets/index.html