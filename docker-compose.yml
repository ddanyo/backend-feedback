services:
  postgres:
    image: postgres:17-alpine
    container_name: fs-postgres-container
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - feedback-system-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: fs-backend-container
    image: fs-backend:0.0.1
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@fs-postgres-container:${DB_PORT}/${DB_NAME}?schema=public
    env_file:
      - .env
    networks:
      - feedback-system-network

  proxy:
    image: nginx:alpine
    container_name: proxy-container
    ports:
      - '2510:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - feedback-system-network

volumes:
  pg_data:

networks:
  feedback-system-network:
    external: true
