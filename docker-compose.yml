services:
    postgres:
        image: postgres:17-alpine
        container_name: fs-postgres
        restart: always
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        env_file:
            - .env
        ports:
            - '5433:5432'
        volumes:
            - pg_data:/var/lib/postgresql/data
            - ./test-data/dump.sql:/docker-entrypoint-initdb.d/init.sql:ro
        networks:
            - feedback-system-network
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_NAME}']
            interval: 5s
            timeout: 5s
            retries: 5

    backend:
        container_name: fs-backend
        image: fs-backend-image
        build:
            context: .
            dockerfile: Dockerfile
        restart: always
        depends_on:
            postgres:
                condition: service_healthy
        environment:
            - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@fs-postgres:5432/${DB_NAME}?schema=public
        env_file:
            - .env
        networks:
            - feedback-system-network

    proxy:
        image: nginx:alpine
        container_name: fs-proxy
        ports:
            - '2510:80'
        volumes:
            - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - backend
        networks:
            - feedback-system-network

volumes:
    pg_data:

networks:
    feedback-system-network:
        name: feedback-system-network
