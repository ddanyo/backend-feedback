services:
  # 1. NestJS Backend (Порт 3000)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nestjs-backend-f
    # ПРИМЕЧАНИЕ: Здесь НЕТ секции ports: для порта 3000
    # Порт 3000 будет доступен ТОЛЬКО ИЗНУТРИ сети Docker.
    networks:
      - feedback-system-network

  # 4. NGINX Reverse Proxy (Порт 2510)
  nginx:
    image: nginx:alpine
    container_name: reverse_proxy
    # Здесь мы связываем ВНЕШНИЙ порт 2510 с ВНУТРЕННИМ портом 80 Nginx
    ports:
      - '2510:80'
    # Монтируем ваш конфигурационный файл Nginx внутрь контейнера
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend_table
      - frontend_send
    networks:
      - feedback-system-network

networks:
  feedback-system-network:
    driver: bridge
