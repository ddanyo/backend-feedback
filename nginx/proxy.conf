server {
    listen 80;

    # Встроенный DNS Docker, чтобы Nginx не падал, если фронтенды еще грузятся
    resolver 127.0.0.11 valid=10s;

    # 1. Редирект для формы (если забыли слэш)
    location = /send {
        return 301 /send/;
    }

    # 2. Роутинг формы (Отрезаем /send/ и передаем запрос внутрь)
    location ^~ /send/ {
        set $form http://fs-form:80;
        rewrite ^/send/(.*)$ /$1 break;
        proxy_pass $form;
    }

    # 3. Роутинг Бэкенда (API)
    location /api {
        set $backend http://fs-backend:3000;
        proxy_pass $backend;
    }

    # 4. Главный сайт (Таблица) - ловит всё остальное
    location / {
        set $table http://fs-table:80;
        proxy_pass $table;
    }
}